<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wingspan Visual Card Matcher</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="summary">
        <div>
          <p class="eyebrow">Visual fingerprint</p>
          <h1>새 그림 식별 테스트</h1>
        </div>
        <div class="status" id="status" role="status">대기 중</div>
      </header>

      <section class="workspace" aria-label="Camera identification workspace">
        <div class="camera-panel">
          <div class="camera-box" id="cameraBox">
            <video id="camera" autoplay muted playsinline></video>
            <div class="card-guide" id="cardGuide" aria-hidden="true">
              <div class="art-guide"></div>
            </div>
          </div>
          <div class="actions">
            <button id="startCamera" type="button">카메라 시작</button>
            <button id="captureIdentify" type="button" disabled>촬영 식별</button>
            <label class="file-button" for="photoInput">사진 식별</label>
            <button id="sampleIdentify" type="button">샘플 식별</button>
            <input id="photoInput" type="file" accept="image/*" capture="environment" hidden />
          </div>
        </div>

        <aside class="result-panel" aria-label="Identification result">
          <div class="result-card">
            <dt>판정</dt>
            <dd id="matchName">-</dd>
          </div>
          <div class="result-card">
            <dt>점수</dt>
            <dd id="matchScore">-</dd>
          </div>
          <div class="result-card full">
            <dt>매칭 정보</dt>
            <dd id="matchMeta">-</dd>
          </div>
          <div class="result-card full">
            <dt>식별 기준</dt>
            <dd>atlas 새 그림 fingerprint</dd>
          </div>
          <canvas id="artPreview" width="565" height="515" aria-label="Visual fingerprint preview"></canvas>
        </aside>
      </section>
    </main>

    <img id="sampleImage" src="./assets/new_card_sample.jpg" alt="" hidden />
  </body>
</html>
