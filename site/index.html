<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wingspan Korean Card Camera Test</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@6.0.1/dist/tesseract.min.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="summary">
        <div>
          <p class="eyebrow">Latin-name OCR</p>
          <h1>영문 이름 식별 테스트</h1>
        </div>
        <div class="status" id="status" role="status">대기 중</div>
      </header>

      <section class="workspace" aria-label="Camera identification workspace">
        <div class="camera-panel">
          <div class="camera-box" id="cameraBox">
            <video id="camera" autoplay muted playsinline></video>
            <div class="card-guide" id="cardGuide" aria-hidden="true">
              <div class="name-guide"></div>
            </div>
          </div>
          <div class="actions">
            <button id="startCamera" type="button">카메라 시작</button>
            <button id="captureIdentify" type="button" disabled>촬영 식별</button>
            <button id="sampleIdentify" type="button">샘플 식별</button>
          </div>
        </div>

        <aside class="result-panel" aria-label="Identification result">
          <div class="result-card">
            <dt>판정</dt>
            <dd id="matchName">-</dd>
          </div>
          <div class="result-card">
            <dt>점수</dt>
            <dd id="matchScore">-</dd>
          </div>
          <div class="result-card full">
            <dt>영문 OCR</dt>
            <dd id="ocrText">-</dd>
          </div>
          <div class="result-card full">
            <dt>식별 기준</dt>
            <dd>알락귀뿔논병아리 · Podilymbus podiceps</dd>
          </div>
          <canvas id="namePreview" width="2040" height="400" aria-label="OCR crop preview"></canvas>
        </aside>
      </section>
    </main>

    <canvas id="cardCanvas" width="630" height="970" hidden></canvas>
    <img id="sampleImage" src="./assets/new_card_sample.jpg" alt="" hidden />
  </body>
</html>
