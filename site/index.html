<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Wingspan Scanner</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="scanner">
      <video id="camera" autoplay muted playsinline></video>

      <div class="scan-overlay" id="cameraBox" aria-label="Camera scanner">
        <div class="scan-frame" id="cardGuide" aria-hidden="true">
          <div class="art-guide"></div>
          <span class="corner top-left"></span>
          <span class="corner top-right"></span>
          <span class="corner bottom-left"></span>
          <span class="corner bottom-right"></span>
        </div>
      </div>

      <header class="scanner-top">
        <div>
          <p class="eyebrow">Visual fingerprint</p>
          <h1>Wingspan Scanner</h1>
        </div>
        <div class="status" id="status" role="status">Idle</div>
      </header>

      <section class="bottom-sheet" aria-label="Scanner controls and result">
        <div class="actions">
          <button id="startCamera" type="button">Start camera</button>
        </div>

        <div class="result-row">
          <div class="result-card main-result">
            <dt>Match</dt>
            <dd id="matchName">-</dd>
          </div>
          <div class="result-card score-result">
            <dt>Score</dt>
            <dd id="matchScore">-</dd>
          </div>
          <div class="result-card detail-result">
            <dt>Details</dt>
            <dd id="matchMeta">-</dd>
          </div>
        </div>

        <canvas id="artPreview" width="565" height="515" aria-label="Visual fingerprint preview"></canvas>
      </section>
    </main>
  </body>
</html>
