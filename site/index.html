<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>윙스팬 카드 스캐너</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="scanner" data-mode="live">
      <video id="camera" autoplay muted playsinline></video>
      <canvas id="snapshot" class="snapshot" aria-hidden="true"></canvas>
      <div class="success-glow" id="successGlow" aria-hidden="true"></div>

      <div class="scan-overlay" id="cameraBox" aria-label="카메라 스캐너">
        <div class="scan-frame" id="cardGuide" aria-hidden="true">
          <div class="ocr-guide title-guide" data-label="이름/학명"></div>
          <div class="ocr-guide score-guide" data-label="점수"></div>
          <div class="ocr-guide wing-guide" data-label="날개길이"></div>
          <div class="ocr-guide ability-guide" data-label="능력 문구"></div>
          <span class="corner top-left"></span>
          <span class="corner top-right"></span>
          <span class="corner bottom-left"></span>
          <span class="corner bottom-right"></span>
        </div>
      </div>

      <header class="scanner-top">
        <div>
          <p class="eyebrow">한글 OCR</p>
          <h1>윙스팬 카드 스캐너</h1>
        </div>
        <div class="status" id="status" role="status">대기</div>
      </header>

      <section class="candidate-panel" id="candidatePanel" aria-label="후보 카드" hidden>
        <div class="candidate-list" id="candidateList"></div>
      </section>

      <div class="shutter-bar" id="shutterBar">
        <div class="capture-controls">
          <button class="voice-button" id="voiceButton" type="button" aria-label="새 이름 말하기" title="새 이름 말하기">
            <span class="voice-icon" aria-hidden="true"></span>
          </button>
          <button class="shutter-button" id="shutterButton" type="button" aria-label="카드 촬영">
            <span class="shutter-ring" aria-hidden="true"></span>
          </button>
        </div>
        <button class="retake-button" id="retakeButton" type="button" hidden>
          다시 찍기
        </button>
      </div>

      <section class="bottom-sheet is-collapsed" id="debugSheet" aria-label="스캔 결과">
        <button
          class="sheet-toggle"
          id="debugToggle"
          type="button"
          aria-expanded="false"
          aria-controls="debugContent"
        >
          인식률 --
        </button>
        <div class="sheet-content" id="debugContent">
          <div class="control-row">
            <label class="toggle-control">
              <input type="checkbox" id="abilityToggle" />
              <span class="toggle-track" aria-hidden="true"></span>
              <span>능력 설명</span>
            </label>
          </div>
          <div class="result-row">
            <div class="result-card main-result">
              <dt>일치 카드</dt>
              <dd id="matchName">-</dd>
            </div>
            <div class="result-card score-result">
              <dt>인식률</dt>
              <dd id="matchScore">-</dd>
            </div>
            <div class="result-card detail-result">
              <dt>상세 정보</dt>
              <dd id="matchMeta">-</dd>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
