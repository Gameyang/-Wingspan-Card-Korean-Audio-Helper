<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wingspan Korean Card OCR Test</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="summary" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Korean atlas OCR smoke test</p>
          <h1 id="page-title">새 카드 식별 테스트</h1>
        </div>
        <dl class="stats" aria-label="Atlas summary">
          <div>
            <dt>Atlas</dt>
            <dd>3</dd>
          </div>
          <div>
            <dt>Grid</dt>
            <dd>10 x 7</dd>
          </div>
          <div>
            <dt>Sample</dt>
            <dd>1</dd>
          </div>
        </dl>
      </section>

      <section class="workspace" aria-label="Sample card inspection">
        <figure class="sample">
          <img
            src="./assets/new_card_sample.jpg"
            alt="알락귀뿔논병아리 테스트 카드"
            width="630"
            height="970"
          />
        </figure>

        <aside class="panel" aria-label="Expected identification">
          <div class="status-row">
            <span class="status-dot" aria-hidden="true"></span>
            <span>샘플 추출 완료</span>
          </div>
          <dl class="details">
            <div>
              <dt>위치</dt>
              <dd>atlas 1, row 1, col 1</dd>
            </div>
            <div>
              <dt>기대 한글명</dt>
              <dd>알락귀뿔논병아리</dd>
            </div>
            <div>
              <dt>학명</dt>
              <dd>Podilymbus podiceps</dd>
            </div>
            <div>
              <dt>카드 크기</dt>
              <dd>630 x 970</dd>
            </div>
          </dl>
        </aside>
      </section>
    </main>
  </body>
</html>
